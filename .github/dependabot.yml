version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, ci]

  - package-ecosystem: gomod
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, api]

  - package-ecosystem: pub
    directory: /apps/mobile
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, mobile]

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, api]

  - package-ecosystem: terraform
    directory: /infra/terraform/bootstrap
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, infrastructure]

  - package-ecosystem: terraform
    directory: /infra/terraform/service
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, infrastructure]
