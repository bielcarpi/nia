name: nia_flutter
description: A realtime AI language tutor with a credential-free local demo.
publish_to: none

version: 2.0.0+2

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.8
  firebase_app_check: ^0.4.5+2
  firebase_auth: ^6.5.6
  firebase_core: ^4.12.1
  flutter:
    sdk: flutter
  flutter_webrtc: ^1.5.2
  http: ^1.6.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo/
