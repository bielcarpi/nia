name: Feature proposal
description: Propose an improvement to Nia
title: "feat: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Who has the problem and what cannot they do today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe behavior, not a specific implementation.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Share constraints, alternatives, or mockups that may help.
